name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  validate:
    name: Validate MCP server
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: 🟢 Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧱 Worker bundles (dry-run) — gate against missing committed deps
        # `wrangler deploy --dry-run` bundles worker.mjs WITHOUT deploying. It fails
        # if any static import (e.g. ./kernels/index.mjs) can't resolve in the
        # COMMITTED tree — the recurring "MCP down after push" cause (deps produced
        # by generate.mjs but not committed). Because `deploy` needs `validate`, a
        # broken bundle now blocks the deploy instead of taking the worker down.
        run: npx wrangler@4.99.0 deploy --dry-run --outdir /tmp/worker-build

      - name: 🏷 Tool-name collision check (CONTRACT §A4.1)
        # Fails on a fatal mcp_name collision (node-vs-node, pilot-vs-pilot, or utility
        # reuse) — the class that 500s the /mcp handshake. Warns on pilot↔node twins.
        run: node scripts/check-tool-names.mjs

      - name: 📐 Surface-parity gate (discovery layer invariants)
        # Guards the discovery-layer wave invariants:
        # (1) hand-authored Prompts ≤ 15 (target ~12; auto-derive loop removed)
        # (2) auto-derive loop absent (find_chain replaced 283 chain Prompts for agents)
        # (3) find_chain + find_tool registered as discovery tools
        # (4) counts.json mcp_tools_total = live nodes + pilot + 9 utility tools
        run: node scripts/surface-parity.mjs

      - name: 🛡 Worker hot-path invariants (2026-06-26 /mcp outage guards)
        # Deterministic block on the EXACT patterns that caused the /mcp outages:
        # (1) caching+reusing the McpServer ("Already connected to a transport" => 500)
        # (2) re-parsing the 330KB *-list.json on the cold-start hot path (1102 exceededCpu)
        # (3) the eager getStaticDiscovery 4-asset loader (subrequests + parse)
        # (4) tools/call refetching static discovery instead of using loadData known-names
        # (5) malformed static discovery .sse.txt / initialize.json artifacts
        # wrangler dev can't enforce the Free CPU/subrequest limits, so this prevents the
        # regression at the source. Memory: project-ainumbers-mcp-server-no-cache.
        run: node scripts/check-worker-invariants.mjs

      - name: 🧯 Malformed-body fast-fail (audit F1, 2026-07-09)
        # A syntactically-invalid JSON POST to /mcp used to hang for HANG_GUARD_MS (25s) then
        # 504 "Server timeout" — request.json() consumed the body stream, left body===undefined,
        # and the SDK transport tried to re-read the same drained stream via toReqRes(request).
        # Reproduced 3x on live https://mcp.ainumbers.co/mcp before this fix. Now fast-fails with
        # a typed 400/-32700 before the transport is touched. Guards against the regression.
        run: node scripts/test-malformed-body-fastfail.mjs

      - name: 🪞 Single-tool build parity (O(1) tools/call == full build)
        # buildServer(data,{onlyTool}) must register the requested tool's definition byte-identically
        # to the full build, and the loadData-derived known-set must cover ALL registered tools (no
        # false -32602 from the unknown-tool short-circuit). Guards the cold-isolate 1102 fix
        # (early-skip non-onlyTool node-schema construction) against regression.
        run: node scripts/build-mcp-parity.mjs

      - name: 🧩 Kernel coverage check (CONTRACT §A4)
        # Fails if any chaingraph node with compute_capability:"server" (gpu:false)
        # lacks a matching *.kernel.mjs in vendored kernels/. Enforces full agent-native
        # coverage — any new server node without a kernel breaks CI here before deploy.
        # --strict also fails on orphan kernel files (kernel with no matching server node).
        run: node scripts/kernel-coverage.mjs --strict

      - name: 🔗 Validate named chains
        run: node scripts/validate-chains.mjs

      - name: 🧾 Input-attestations gate (§23)
        # SPEC.md §15 row: real rfc3161-snapshot verify (reuses the §20 rfc3161-tst verifier, no
        # second impl), real vc-2.0 Data Integrity verify, c2pa-manifest structural check, zktls
        # structural digest-binding, plus tamper/unresolved-pointer/digest-mismatch failure cases.
        run: node scripts/validate-input-attestations.test.mjs

      - name: 🕐 ttlMs cache-key is input-hash-only (§M1.5)
        # Proves the advertised cacheHint.cacheKey:"input_hash" contract: identical
        # policy_parameters (any key order) -> identical key; a changed input -> a
        # changed key. Never wall-clock, never a session id.
        run: node scripts/test-ttl-cache-key.mjs

      - name: 📝 Description-quality dogfood gate (§M2.2.1 / MCP-500-2 §M2.1)
        # Runs the suite's OWN lint_mcp_tool_definition ruleset (ported logic — the live site tool
        # is execution_type:"browser-reference", no server-callable kernel to invoke directly) over
        # every registered tool definition. Baseline-shielded (data/mcp-lint-baseline.json,
        # counts-only-down) so it lands strict-forward without blocking on legacy debt.
        run: node scripts/check-tool-description-quality.mjs

      - name: 🗑 Deprecation lifecycle (§M2.2) — Removed tools 404 cleanly, never 500
        run: node scripts/gate-deprecation-lifecycle.mjs

      - name: 🔎 Tool-selection eval (§M2.4) — can agents FIND tools at 300+, not just call them
        # Fixed, deterministic NL-task -> expected-mcp_name fixtures via find_tool (no live model
        # call, never flaky). Negative-tested: a deliberately wrong expected-tool must fail.
        # §M2.5 note: validate_mcp_server_json as a CI gate is DEDUPED against PUBLISH-REFRESH —
        # stays unwired until that lands (registry server.json sync/validation is its job, not
        # this WU's). Not blocking §M2.1-§M2.4 above.
        run: node scripts/gate-tool-selection-eval.mjs

      - name: 📥 Checkout site repo (vendor-freshness + schema source)
        # PostOakLabs/ainumbers is PUBLIC — the default token checks it out, no secret needed.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: PostOakLabs/ainumbers
          path: _site
          fetch-depth: 1
          persist-credentials: false

      - name: 🗄 Chain-fixtures freshness (OCGR Phase A)
        # Regenerates chain-fixtures.json in-memory from the checked-out site HEAD and
        # diffs vs the committed data/chain-fixtures.json. Fails on drift so a stale
        # fixture bundle never deploys. Mirrors vendor-freshness for chaingraph.json.
        run: SITE_REPO=_site node scripts/gen-chain-fixtures.mjs --check

      - name: 🔄 Vendor-freshness — data/ + kernels/ current vs site (CONTRACT §A4 #3)
        # Closes the gap the local PreToolUse hook can't guard (the `gh pr merge` path): confirms the
        # COMMITTED vendored data/chaingraph.json + bundled kernels/ match the site source, so a
        # "edited chaingraph.json but forgot to re-vendor" can never deploy a stale catalog.
        # Semantic compare (parsed-JSON / \r-normalized) — robust to line-ending + formatting noise.
        run: SITE_REPO=_site node scripts/check-vendor-fresh.mjs

      - name: 📐 schema-validate vendored chaingraph.json (OCG v0.4 SSOT)
        # Validates the worker's shipped data/chaingraph.json against the standard/ JSON Schema in the
        # site repo, so a malformed node object can't deploy. Mirrors the site's schema-validate gate.
        run: node _site/chaingraph/standard/schema-validate.mjs
        env:
          SCHEMA: _site/chaingraph/standard/openchain-graph-v0.4.schema.json
          CHAINGRAPH: data/chaingraph/chaingraph.json
          FIXTURES_DIR: _site/chaingraph/kernels/fixtures

      - name: 🧬 Full-corpus chain E2E + schema conformance (audit Suite E1/E3)
        # test-run-chain-fixtures.mjs only smoke-tests ONE example chain
        # (agent-commerce-conformance) as proof the fixture-default mechanism
        # works. This step runs run_chain end-to-end for EVERY fixture-backed
        # chain in data/chain-fixtures.json (147 of 266 named chains — the
        # remainder need browser-side/manual inputs and are out of scope for a
        # server-side gate), asserting completion, steps_ran vs step_count
        # (gate-aware), a 64-hex composite_execution_hash, run-to-run
        # determinism, AND validates every emitted composite_artifact against
        # the v0.4 JSON Schema via _site's schema-validate.mjs. Catches silent
        # per-chain kernel/fixture regressions the single-chain smoke test
        # cannot see.
        run: node scripts/run-chain-corpus.mjs

      - name: 🔁 Cross-tool artifact round-trip (audit AUD-C1)
        # Proves an artifact EMITTED by emit_chaingraph_artifact (Mode 4 server compute) actually
        # VERIFIES through the SEPARATE verify_execution_hash MCP tool — the loop closes across a
        # real tool boundary, not just within one tool's own self-check. A one-field mutation of
        # the same artifact is then asserted INVALID. Sampled over 24 live gpu:false nodes.
        run: node scripts/gate-crosstool-roundtrip.mjs

      - name: 📤 Export-format consistency (audit AUD-C2)
        # Proves export_artifact's format variants (xlsx/csv/pdf/xbrl/vc) describe the SAME
        # underlying evidence for identical input: every format's returned metadata block AND the
        # execution_hash recoverable from the rendered bytes themselves must agree. Also found (and
        # excludes from its sample, flagging rather than fixing — see the 2026-07-09 audit report)
        # a pre-existing bug: kernels whose compliance_flags is an object map instead of an array
        # throw inside the xlsx exporter.
        run: node scripts/gate-export-format-consistency.mjs

      - name: 🚧 Negative gate-enforcement (audit AUD-E2)
        # Proves a chain fed input that trips a §21.4 decision gate actually HALTS/escalates —
        # never a silent full pass. Covers all 15 gated chains whose rule[0] routes to a genuine
        # halt/escalate target ("end"/"escalate"); 3 gates that reroute to an alternate live step
        # (conditional branching, not a violation gate) are out of scope and noted in the gate.
        run: node scripts/gate-negative-enforcement.mjs

      - name: 🌐 Zero-egress determinism proof (audit AUD-F4)
        # Proves every live gpu:false kernel-backed node (determinism-claiming, CONTRACT §0) makes
        # no outbound network call: a static grep of each kernel's local import closure for
        # fetch/XMLHttpRequest/WebSocket/non-local dynamic import, PLUS a dynamic run of every
        # fixture-backed kernel with fetch/XHR/WebSocket stubbed to throw.
        run: node scripts/gate-zero-egress.mjs

      - name: 📋 Pilot tool count
        run: |
          node -e "
            import('./pilot.mjs').then(({ PILOT }) => {
              console.log('Pilot tools: ' + PILOT.length);
            });
          "

      - name: 🏷 Registry sync check (dry run)
        # Verifies server.json description is ≤100 chars and version is semver.
        # Does NOT write — just confirms a --write run would succeed.
        # Run  node scripts/sync-registry.mjs --write  locally before publishing.
        run: node scripts/sync-registry.mjs

      - name: 📐 server.json schema check
        run: |
          node -e "
            import { readFileSync } from 'fs';
            const s = JSON.parse(readFileSync('server.json', 'utf8'));
            const checks = [
              ['\$schema' in s,    'missing \$schema'],
              [!!s.name,           'missing name'],
              [!!s.version,        'missing version'],
              [!!s.description,    'missing description'],
              [s.description.length <= 100, 'description > 100 chars (' + s.description?.length + ')'],
              [Array.isArray(s.remotes) && s.remotes.length > 0, 'missing remotes'],
            ];
            let ok = true;
            for (const [pass, msg] of checks) {
              if (!pass) { console.error('❌ ' + msg); ok = false; }
              else        { console.log('✅ ' + (msg.split(' ').slice(1).join(' ') || 'ok')); }
            }
            if (!ok) process.exit(1);
          "

  # DEPLOYER = GitHub Actions, and ONLY GitHub Actions (gated on `validate`).
  # Cloudflare Workers Builds (native Git integration) must stay DISCONNECTED —
  # running both creates a double-deployer (two versions ~13s apart per push) and
  # the Workers Build is UNgated, so it ships unvalidated/broken bundles. This was
  # decided 2026-06-12 and regressed on 2026-06-19 (Workers Build reconnected →
  # outage). If the MCP goes down after a push, first check that a Workers Build
  # didn't get reconnected (Cloudflare dash → ainumbers-mcp → Settings → Build).
  # NOTE: this job deploys COMMITTED files only — it does NOT run generate.mjs
  # (that needs the sibling ../repo, absent in CI). So data/ and kernels/ MUST be
  # committed + current in the same push (run `node generate.mjs` locally first).
  deploy:
    name: Deploy to Cloudflare Workers
    needs: validate           # only deploys if the validate job above passes
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2   # need HEAD^ to diff newly-vendored nodes (scripts/diff-new-nodes.mjs)
          persist-credentials: false

      - name: 🟢 Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: '22'
          # package-manager-cache defaults to true (auto-detects packageManager
          # in package.json) independent of the old `cache:` input — explicitly
          # disabled here. This job holds CLOUDFLARE_API_TOKEN/CLOUDFLARE_ACCOUNT_ID,
          # and a restored cache is an untrusted-write surface (zizmor:
          # cache-poisoning). The validate job's npm cache is unaffected (no paid
          # secrets there); this deploy job installs clean every run.
          package-manager-cache: false

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🚀 Deploy worker
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.99.0'   # project uses Wrangler 4 features (run_worker_first, assets binding); v3 default rejects them
          command: deploy

      - name: 🔌 Post-deploy /mcp smoke test
        # The lasting guardrail. Performs a real MCP `initialize` against the LIVE endpoint
        # after deploy. Catches runtime tool-registration throws (e.g. duplicate mcp_name)
        # that 500 the handshake while the worker otherwise serves — the class that the
        # bundle dry-run in `validate` CANNOT catch and that shipped twice through green CI.
        # A failure here turns the deploy red immediately; roll back in Cloudflare.
        run: node scripts/smoke-mcp.mjs

      - name: 🆕 Detect nodes vendored this push
        id: newnodes
        run: |
          NEW=$(node scripts/diff-new-nodes.mjs)
          echo "names=$NEW" >> "$GITHUB_OUTPUT"
          echo "New nodes this push: ${NEW:-none}"
        env:
          CHAINGRAPH: ${{ github.workspace }}/data/chaingraph/chaingraph.json

      - name: Hash-sweep (every live gpu:false node returns a valid hash)
        run: node scripts/hash-sweep.mjs
        env:
          MCP_URL: https://mcp.ainumbers.co/mcp
          CHAINGRAPH: ${{ github.workspace }}/data/chaingraph/chaingraph.json
          KERNELS_DIR: ${{ github.workspace }}/kernels
          THROTTLE_MS: '1500'
          NEW_NODE_NAMES: ${{ steps.newnodes.outputs.names }}

      - name: Verify MCP tool registration (live tools/list)
        run: node scripts/verify-mcp-registered.mjs --all
        env:
          MCP_URL: https://mcp.ainumbers.co/mcp

      - name: 🔢 Live /mcp tool count == committed mcp.live (count-drift gate)
        # Cross-repo count assertion: reads committed data/counts.json (mcp_tools_total
        # generated by generate.mjs from PILOT.length + chaingraph live nodes + utility),
        # then asserts the live /mcp tools/list returns the same count.
        # Fixes: re-run node generate.mjs locally, commit data/, push.
        run: |
          node -e "
            import { readFileSync } from 'fs';
            import { resolve } from 'path';

            const MCP_URL = process.env.MCP_URL || 'https://mcp.ainumbers.co/mcp';
            // Cloudflare WAF rate-limits /mcp (50 req/10s per IP). This step runs after the
            // hash-sweep + registration burst, so its single tools/list can hit a saturated
            // window (429/503 → parsed as 0 → false DRIFT). Retry past the 10s window.
            const RL_RETRIES = Number(process.env.RL_RETRIES || 5);
            const RL_BACKOFF_MS = Number(process.env.RL_BACKOFF_MS || 6000);
            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
            const counts = JSON.parse(readFileSync(resolve('data/counts.json'), 'utf8'));
            const expected = counts.mcp_tools_total;
            const body = JSON.stringify({ jsonrpc: '2.0', id: 1, method: 'tools/list', params: {} });

            let live = null;
            for (let attempt = 0; attempt <= RL_RETRIES; attempt++) {
              try {
                const res = await fetch(MCP_URL, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json', 'Accept': 'application/json, text/event-stream' },
                  body,
                });
                const text = await res.text();
                if ((res.status === 429 || res.status === 503) && attempt < RL_RETRIES) {
                  console.error('tools/list HTTP ' + res.status + ' (rate-limited) — retry ' + (attempt + 1) + '/' + RL_RETRIES + ' after ' + RL_BACKOFF_MS + 'ms');
                  await sleep(RL_BACKOFF_MS); continue;
                }
                if (!res.ok) { console.error('tools/list HTTP ' + res.status); process.exit(1); }
                // Handle both plain JSON and SSE (event: message\ndata: {...})
                const jsonStr = text.startsWith('event:') ? text.split('\\ndata: ')[1]?.split('\\n')[0] : text;
                const data = JSON.parse(jsonStr);
                live = (data?.result?.tools ?? []).length;
                break;
              } catch (e) {
                if (attempt < RL_RETRIES) {
                  console.error('tools/list failed: ' + e.message + ' — retry ' + (attempt + 1) + '/' + RL_RETRIES + ' after ' + RL_BACKOFF_MS + 'ms');
                  await sleep(RL_BACKOFF_MS); continue;
                }
                console.error('tools/list failed: ' + e.message); process.exit(1);
              }
            }
            if (live === null) { console.error('tools/list unreachable after ' + RL_RETRIES + ' retries'); process.exit(1); }

            if (live !== expected) {
              console.error('DRIFT: live /mcp tools/list count=' + live + ' != committed mcp_tools_total=' + expected);
              console.error('Fix: run node generate.mjs locally, commit data/counts.json, push.');
              process.exit(1);
            }
            console.log('OK: live /mcp tool count=' + live + ' matches committed mcp_tools_total=' + expected);
          "
        env:
          MCP_URL: https://mcp.ainumbers.co/mcp
